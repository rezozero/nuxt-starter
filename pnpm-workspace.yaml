packages:
  - stories

minimumReleaseAgeExclude:
  - '@rezo-zero/nuxt-cache-control'
  - esbuild@0.28.1

overrides:
  # Temporary: i18n 10.3.0 regression (NuxtLink no-op with defineI18nRoute(false)), see CLAUDE.md
  # https://github.com/nuxt-modules/i18n/issues/3989 / https://github.com/nuxt-modules/i18n/issues/3960
  "@nuxtjs/i18n": "10.2.4"
  # Generated by pnpm audit --fix=override
  esbuild@>=0.17.0 <0.28.1: ^0.28.1
  esbuild@>=0.27.3 <0.28.1: ^0.28.1

allowBuilds:
  '@parcel/watcher': true
  '@sentry/cli': true
  core-js: true
  esbuild: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
