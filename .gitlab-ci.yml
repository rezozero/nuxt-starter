stages:
    - test
    - build
    - release

# AutoDevOps templates for security
include:
    - template: Jobs/Secret-Detection.gitlab-ci.yml
    - template: Jobs/Dependency-Scanning.gitlab-ci.yml

test_audit:
    image: node:24-alpine
    stage: test
    interruptible: true
    rules:
        -   if: '$CI_COMMIT_BRANCH == "develop"'
        -   if: '$CI_COMMIT_TAG'
        -   if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    cache:
        paths:
            - ./node_modules/
            - ./.pnpm-store/
    before_script:
        - corepack enable
        - pnpm install --frozen-lockfile
    allow_failure: true
    script:
        - pnpm audit --audit-level=moderate --prod

build_merge_requests:
    stage: build
    image: docker:git
    rules:
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    services:
        - docker:dind
    variables:
        DOCKER_DRIVER: overlay2
        DOCKER_TLS_CERTDIR: "/certs"
        # Provide env vars for docker bake
        REGISTRY: ${CI_REGISTRY_IMAGE}
    script:
        # Print docker image to be built with their args
        - "docker buildx bake --print"
        - "docker buildx bake"

build_develop:
    stage: build
    image: docker:git
    rules:
        - if: $CI_COMMIT_BRANCH == "develop"
    services:
        - docker:dind
    variables:
        DOCKER_DRIVER: overlay2
        DOCKER_TLS_CERTDIR: "/certs"
        # Provide env vars for docker bake
        REGISTRY: ${CI_REGISTRY_IMAGE}
    script:
        # Connect to your Gitlab Registry
        - "echo \"Registry image: ${CI_REGISTRY_IMAGE} for develop\""
        - "docker login -u gitlab-ci-token -p ${CI_JOB_TOKEN} ${CI_REGISTRY}"
        - "docker buildx bake --push"

build_production:
    stage: build
    image: docker:git
    rules:
        - if: $CI_COMMIT_TAG
    services:
        - docker:dind
    variables:
        DOCKER_DRIVER: overlay2
        DOCKER_TLS_CERTDIR: "/certs"
        # Provide env vars for docker bake
        VERSION: ${CI_COMMIT_TAG}
        REGISTRY: ${CI_REGISTRY_IMAGE}
    script:
        # Connect to your Gitlab Registry
        - "echo \"Registry image: ${CI_REGISTRY_IMAGE} for tag ${CI_COMMIT_TAG}\""
        - "docker login -u gitlab-ci-token -p ${CI_JOB_TOKEN} ${CI_REGISTRY}"
        - "docker buildx bake --push"

# ==========================================
# Create release on Gitlab repository
# ==========================================
create_gitlab_release:
    stage: release
    image: registry.gitlab.com/gitlab-org/cli:latest
    allow_failure: true
    rules:
        - if: $CI_COMMIT_TAG
    script:
        - echo "Running the release job."
    needs: [ "build_production" ]
    when: on_success
    release:
        tag_name: $CI_COMMIT_TAG
        name: 'Release $CI_COMMIT_TAG'
        description: './CHANGELOG.md'
